services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    # NOTE: Next.js inlines NEXT_PUBLIC_* vars at `npm run build` time (inside
    # frontend/Dockerfile), not at container runtime. These values only take
    # effect if they match frontend/app/page.tsx's fallback defaults, or if
    # the image is rebuilt after changing them.
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/vessels
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
